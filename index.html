<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozyPomodoro - Seu Companheiro de Estudos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Lottie Player -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        * { font-family: 'Quicksand', sans-serif; user-select: none; outline: none; }
        body { transition: background 1.5s ease, color 0.5s ease; overflow-x: hidden; }

        .theme-focus {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #fbe4ff 100%);
            --accent-color: #ff85a2; --accent-hover: #ff477e; --bg-glass: rgba(255, 255, 255, 0.65);
        }
        .theme-short_break {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #e0f2f1 100%);
            --accent-color: #4caf50; --accent-hover: #388e3c; --bg-glass: rgba(255, 255, 255, 0.7);
        }
        .theme-long_break {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #ede7f6 100%);
            --accent-color: #2196f3; --accent-hover: #1976d2; --bg-glass: rgba(255, 255, 255, 0.7);
        }

        #weatherOverlay { transition: all 1.5s ease; }

        .glass-card {
            background: var(--bg-glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.03);
            border-radius: 24px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px 0 rgba(0,0,0,0.06); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

        .btn-cozy { background-color: var(--accent-color); color: white; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-cozy:hover { background-color: var(--accent-hover); transform: scale(1.05); }
        .btn-cozy:active { transform: scale(0.95); }

        .focus-mode-active .hide-on-focus { opacity: 0 !important; pointer-events: none !important; transform: scale(0.95); }
        .focus-mode-active .glass-card { background: rgba(255, 255, 255, 0.85); }
        .task-done { text-decoration: line-through; opacity: 0.5; }

        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
        }
        .animate-pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }
    </style>
</head>
<body class="theme-focus min-h-screen p-4 md:p-8 flex flex-col justify-between relative text-gray-700">

    <!-- Overlay de clima visual -->
    <div id="weatherOverlay" class="fixed inset-0 pointer-events-none z-0 opacity-0 bg-black"></div>
    
    <!-- Canvas de Partículas Vetoriais -->
    <canvas id="weatherCanvas" class="fixed inset-0 pointer-events-none z-[1]"></canvas>

    <!-- Cabeçalho -->
    <header class="w-full max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 items-center gap-4 z-10 mb-6 hide-on-focus transition-all duration-500">
        <div class="glass-card p-4 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold tracking-wide" id="liveTime">00:00:00</h1>
                <p class="text-xs text-gray-500 font-medium" id="liveDate">Segunda, 01 Jan</p>
            </div>
            <div class="text-right">
                <span class="text-xs bg-white/50 px-2 py-1 rounded-full font-semibold text-gray-600 border border-white/40 shadow-xs transition-all" id="weatherWidget">
                    <i class="fa-solid fa-leaf text-amber-500 mr-1"></i> Cozy
                </span>
            </div>
        </div>

        <div class="glass-card p-4 text-center flex items-center justify-center min-h-[72px]">
            <p id="quoteDisplay" class="text-sm font-medium italic text-gray-600">"É justo que muito custe o que muito vale."</p>
        </div>

        <!-- Seletor de Ambientes -->
        <div class="glass-card p-4 flex items-center justify-between gap-2">
            <span class="text-xs font-bold text-gray-500 uppercase tracking-wider"><i class="fa-solid fa-mountain-sun mr-1"></i> Ambiente:</span>
            <select id="environmentSelect" class="bg-white/80 border border-white rounded-xl px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-rose-300 transition-all text-gray-700 cursor-pointer">
                <option value="quarto_cozy">Quarto Cozy (Folhas de Outono)</option>
                <option value="jardim">Jardim (Pétalas de Sakura)</option>
                <option value="espaco">Espaço (Estrelas Brilhantes)</option>
                <option value="noite_chuvosa">Noite Chuvosa (Chuva)</option>
                <option value="biblioteca">Biblioteca (Poeira de Ouro)</option>
                <option value="cafe">Cafeteria (Fumaça de Café)</option>
            </select>
        </div>
    </header>

    <!-- Hub Central -->
    <main class="w-full max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start z-10 flex-1">
        
        <!-- COLUNA ESQUERDA: Tarefas & Hábitos -->
        <section class="lg:col-span-3 space-y-6 hide-on-focus transition-all duration-500">
            <div class="glass-card p-5">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-bold text-base flex items-center gap-2"><i class="fa-solid fa-list-check text-rose-400"></i> Suas Tarefas</h2>
                    <span id="taskCounter" class="text-xs font-semibold bg-gray-200/60 px-2 py-0.5 rounded-full text-gray-600">0/0</span>
                </div>
                <div class="flex gap-2 mb-3">
                    <input type="text" id="newTaskInput" placeholder="Estudar, ler..." class="w-full bg-white/80 border border-white rounded-xl px-3 py-2 text-sm placeholder:text-gray-400 focus:bg-white transition-all">
                    <button id="addTaskBtn" class="btn-cozy w-10 h-10 rounded-xl flex items-center justify-center text-sm shadow-xs"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="flex justify-between items-center gap-1 mb-3">
                    <select id="taskPrioritySelect" class="text-xs bg-white/60 border border-white rounded-lg px-2 py-1 text-gray-500 w-full">
                        <option value="1">Prioridade Baixa</option>
                        <option value="2" selected>Prioridade Média</option>
                        <option value="3">Prioridade Alta</option>
                    </select>
                </div>
                <div id="taskListContainer" class="space-y-2.5 max-h-[220px] overflow-y-auto pr-1"></div>
            </div>

            <div class="glass-card p-5">
                <h2 class="font-bold text-base mb-3 flex items-center gap-2"><i class="fa-solid fa-heart-pulse text-emerald-400"></i> Hábitos do Dia</h2>
                <div class="space-y-3">
                    <div class="flex items-center justify-between p-2 bg-white/40 rounded-xl border border-white/20">
                        <span class="text-xs font-medium"><i class="fa-solid fa-glass-water text-blue-400 mr-2"></i> Beber Água</span>
                        <div class="flex items-center gap-2">
                            <span id="waterCounter" class="text-xs text-gray-500 font-bold">0/8</span>
                            <button onclick="updateHabit('water', 1)" class="w-6 h-6 rounded-lg bg-white shadow-xs hover:bg-blue-50 flex items-center justify-center text-xs text-blue-500 border border-gray-100"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- COLUNA CENTRAL: Timer & Mascote -->
        <section class="lg:col-span-6 flex flex-col items-center justify-center space-y-6">
            <div id="mascoteContainer" class="w-44 h-44 flex items-center justify-center relative select-none cursor-pointer">
                <lottie-player id="lottieMascot" src="https://assets9.lottiefiles.com/packages/lf20_bhebjzpu.json" background="transparent" speed="1" style="width: 100%; height: 100%;" loop autoplay></lottie-player>
                <div id="mascotBubble" class="absolute -top-6 bg-white border border-gray-100 rounded-xl px-3 py-1 text-xs font-semibold text-gray-600 shadow-md opacity-0 pointer-events-none transform scale-90 transition-all duration-300">
                    Vamos lá! ☕
                </div>
            </div>

            <div class="glass-card w-full max-w-md p-8 flex flex-col items-center relative overflow-hidden">
                <div class="flex gap-2 mb-6 bg-black/5 p-1.5 rounded-2xl w-full justify-between">
                    <button onclick="switchMode('focus')" id="tab-focus" class="text-xs font-bold py-2 px-4 rounded-xl transition-all flex-1 text-center">🍅 Foco</button>
                    <button onclick="switchMode('short_break')" id="tab-short_break" class="text-xs font-bold py-2 px-4 rounded-xl transition-all flex-1 text-center">🍃 Pausa Curta</button>
                    <button onclick="switchMode('long_break')" id="tab-long_break" class="text-xs font-bold py-2 px-4 rounded-xl transition-all flex-1 text-center">💤 Pausa Longa</button>
                </div>

                <div class="relative w-64 h-64 flex items-center justify-center mb-6">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" stroke="rgba(0,0,0,0.03)" stroke-width="5" fill="transparent"/>
                        <circle id="progressCircle" cx="50" cy="50" r="45" stroke="var(--accent-color)" stroke-width="5" fill="transparent" 
                                style="stroke-dasharray: 282.7; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear;" stroke-linecap="round"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="timerCountdown" class="text-5xl font-bold tracking-tight text-gray-800">25:00</span>
                        <span id="currentSessionLabel" class="text-xs font-bold text-gray-400 mt-1 uppercase tracking-widest">Sessão #1</span>
                    </div>
                </div>

                <div class="flex items-center gap-4 w-full">
                    <button id="resetTimerBtn" class="w-12 h-12 rounded-xl bg-white/80 border border-gray-200/50 shadow-xs text-gray-500 hover:text-gray-700 hover:bg-white flex items-center justify-center transition-all text-lg active:scale-90"><i class="fa-solid fa-arrow-rotate-left"></i></button>
                    <button id="toggleTimerBtn" class="btn-cozy flex-1 h-14 rounded-2xl font-bold text-base shadow-sm flex items-center justify-center gap-2 tracking-wide">
                        <i class="fa-solid fa-play" id="toggleTimerIcon"></i> <span id="toggleTimerText">Iniciar Foco</span>
                    </button>
                    <button id="skipTimerBtn" class="w-12 h-12 rounded-xl bg-white/80 border border-gray-200/50 shadow-xs text-gray-500 hover:text-gray-700 hover:bg-white flex items-center justify-center transition-all text-lg active:scale-90"><i class="fa-solid fa-forward"></i></button>
                </div>
            </div>
            
            <!-- Rádio Lo-Fi / YouTube API -->
            <div class="glass-card w-full max-w-md p-4 flex flex-col gap-3 hide-on-focus transition-all duration-500 relative overflow-hidden z-10">
                
                <!-- CONTAINER YOUTUBE (Está dentro do card, na tela, mas invisível. Não é bloqueado pelo navegador) -->
                <div class="absolute top-0 left-0 w-full h-full opacity-[0.01] pointer-events-none -z-10">
                    <div id="ytPlayerContainer"></div>
                </div>

                <div class="flex items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-rose-100 text-rose-400 flex items-center justify-center animate-pulse-slow" id="musicDisk">
                            <i class="fa-solid fa-headphones text-base"></i>
                        </div>
                        <div class="max-w-[150px]">
                            <p class="text-xs font-bold text-gray-700">Rádio de Estudos</p>
                            <span id="streamStatus" class="text-[9px] text-gray-400 font-medium break-words leading-tight">Inicializando Player...</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="playMusicBtn" class="w-8 h-8 rounded-lg bg-white/80 text-xs text-gray-600 hover:bg-white flex items-center justify-center border border-gray-200 transition-all"><i class="fa-solid fa-play"></i></button>
                        <input type="range" id="musicVolume" min="0" max="100" value="30" class="w-16 accent-rose-400 cursor-pointer h-1 rounded-lg bg-gray-200">
                    </div>
                </div>
                <div class="flex gap-2 relative z-20">
                    <select id="stationSelect" class="bg-white/80 border border-gray-200 rounded-xl px-2 py-1.5 text-xs font-semibold text-gray-600 flex-1 cursor-pointer">
                        <option value="lTRiuFIWV54">📚 Lofi Girl (1 AM Study Mix)</option>
                        <option value="-5KAN9_CzSA">💤 Lofi Girl (Sleep/Relax Mix)</option>
                        <option value="4xDzrIyXliU">☕ Chillhop (Jazz Relax Mix)</option>
                        <option value="custom">✨ Colar Link do Youtube...</option>
                    </select>
                    <input type="text" id="customVideoInput" placeholder="Cole o link ou ID" class="hidden bg-white/90 border border-gray-200 rounded-xl px-2 py-1 text-xs w-1/2 focus:border-rose-300 transition-all">
                </div>
            </div>
        </section>

        <!-- COLUNA DIREITA: Stats -->
        <section class="lg:col-span-3 space-y-6 hide-on-focus transition-all duration-500">
            <div class="glass-card p-5">
                <h2 class="font-bold text-base mb-3 flex items-center gap-2"><i class="fa-solid fa-chart-pie text-blue-400"></i> Progresso</h2>
                <div class="grid grid-cols-2 gap-3 text-center">
                    <div class="bg-white/40 border border-white/20 p-2.5 rounded-xl">
                        <span class="block text-xl font-bold text-gray-800" id="statTotalPomodoros">0</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Ciclos</span>
                    </div>
                    <div class="bg-white/40 border border-white/20 p-2.5 rounded-xl">
                        <span class="block text-xl font-bold text-gray-800" id="statTotalHours">0.0h</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Horas</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Rodapé -->
    <footer class="w-full max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 mt-6 pt-4 border-t border-black/5 z-10 hide-on-focus transition-all duration-500">
        <p class="text-xs text-gray-400 font-medium">© 2026 CozyPomodoro.</p>
        <button onclick="openModal('settingsModal')" class="text-xs font-bold text-gray-500 hover:text-gray-700 bg-white/60 px-3 py-1.5 rounded-xl border border-white transition-all shadow-xs"><i class="fa-solid fa-sliders mr-1"></i> Configurações</button>
    </footer>

    <!-- MODAL: Configurações -->
    <div id="settingsModal" class="fixed inset-0 bg-black/30 backdrop-blur-xs z-50 flex items-center justify-center hidden opacity-0 transition-all duration-300">
        <div class="glass-card w-full max-w-md p-6 m-4 transform scale-95 transition-transform duration-300">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-lg text-gray-800"><i class="fa-solid fa-gear text-gray-500 mr-2"></i> Ajustes do Tempo</h3>
                <button onclick="closeModal('settingsModal')" class="text-gray-400 hover:text-gray-600 text-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center mb-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">FOCO</label>
                    <input type="number" id="cfgFocus" min="1" max="60" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-1.5 text-center font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">PAUSA CURTA</label>
                    <input type="number" id="cfgShort" min="1" max="30" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-1.5 text-center font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">PAUSA LONGA</label>
                    <input type="number" id="cfgLong" min="1" max="60" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-1.5 text-center font-bold">
                </div>
            </div>
            <button onclick="saveConfigurations()" class="btn-cozy w-full py-2.5 rounded-xl font-bold text-sm shadow-xs">Salvar Alterações</button>
        </div>
    </div>

    <!-- SCRIPT GERAL -->
    <script>
        // --- 1. MOTOR DE SOM SINTETIZADO (Alerta de Ciclos) ---
        const SoundAlerts = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playTone(freq, type, duration, vol, delay = 0) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime + delay);
                
                gain.gain.setValueAtTime(0, this.ctx.currentTime + delay);
                gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + delay + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + delay + duration);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(this.ctx.currentTime + delay);
                osc.stop(this.ctx.currentTime + delay + duration);
            },
            playStart() {
                // Sinos de início
                this.playTone(523.25, 'sine', 1, 0.3, 0);       
                this.playTone(659.25, 'sine', 1.5, 0.3, 0.15);  
            },
            playEnd() {
                // Melodia de conclusão
                this.playTone(523.25, 'triangle', 0.5, 0.2, 0);    
                this.playTone(659.25, 'triangle', 0.5, 0.2, 0.15); 
                this.playTone(783.99, 'triangle', 1.5, 0.2, 0.3);  
            }
        };

        // --- 2. INTEGRAÇÃO YOUTUBE DEFINITIVA ---
        let ytPlayer = null;
        let isMusicPlaying = false;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('ytPlayerContainer', {
                height: '300', // Tamanho real, mas oculto visualmente pelo CSS da div pai
                width: '400', 
                videoId: 'lTRiuFIWV54', // Mix Estático da Lofi Girl (NUNCA CAI)
                playerVars: { 
                    'autoplay': 0, 'controls': 0, 'disablekb': 1, 'fs': 0, 'modestbranding': 1, 'playsinline': 1 
                },
                events: {
                    'onReady': (event) => {
                        event.target.setVolume(30);
                        document.getElementById('streamStatus').innerText = "Pronto para tocar 🎶";
                        setupMusicControls();
                    },
                    'onStateChange': (event) => {
                        const statusLabel = document.getElementById('streamStatus');
                        const disc = document.getElementById('musicDisk');
                        const btnIcon = document.getElementById('playMusicBtn');

                        if (event.data === YT.PlayerState.PLAYING) {
                            statusLabel.innerText = "Tocando Agora 🎵";
                            disc.classList.add('animate-spin');
                            btnIcon.innerHTML = '<i class="fa-solid fa-pause"></i>';
                            isMusicPlaying = true;
                        } else if (event.data === YT.PlayerState.PAUSED) {
                            statusLabel.innerText = "Pausado";
                            disc.classList.remove('animate-spin');
                            btnIcon.innerHTML = '<i class="fa-solid fa-play"></i>';
                            isMusicPlaying = false;
                        } else if (event.data === YT.PlayerState.BUFFERING) {
                            statusLabel.innerText = "Carregando...";
                        }
                    },
                    'onError': (event) => {
                        const err = event.data;
                        let msg = "Erro desconhecido.";
                        if (err === 101 || err === 150) msg = "O dono do vídeo bloqueou sites externos. Escolha outro!";
                        else if (err === 100) msg = "Vídeo não encontrado. Pode ter sido apagado.";
                        document.getElementById('streamStatus').innerText = "Erro: " + msg;
                    }
                }
            });
        };

        function setupMusicControls() {
            document.getElementById('playMusicBtn').addEventListener('click', () => {
                if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
                isMusicPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
            });

            document.getElementById('musicVolume').addEventListener('input', (e) => {
                if (ytPlayer && typeof ytPlayer.setVolume === 'function') {
                    ytPlayer.setVolume(e.target.value);
                }
            });

            const customInput = document.getElementById('customVideoInput');
            document.getElementById('stationSelect').addEventListener('change', (e) => {
                if (!ytPlayer) return;
                const value = e.target.value;
                if (value === 'custom') {
                    customInput.classList.remove('hidden');
                    customInput.focus();
                } else {
                    customInput.classList.add('hidden');
                    ytPlayer.loadVideoById(value);
                }
            });

            customInput.addEventListener('input', (e) => {
                if (!ytPlayer) return;
                let val = e.target.value.trim();
                // RegEx ultra precisa para extrair ID do youtube
                const match = val.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
                if (match && match[1]) {
                    ytPlayer.loadVideoById(match[1]);
                } else if (val.length === 11) {
                    ytPlayer.loadVideoById(val);
                }
            });
        }

        // --- 3. MOTOR VETORIAL DE AMBIENTES ---
        let canvas, ctx, particles = [], activeEnvironment = 'quarto_cozy';

        const ambienteConfigs = {
            'quarto_cozy': { icon: 'fa-leaf text-amber-500', label: 'Outono', overlay: 'opacity-0 bg-black' },
            'jardim': { icon: 'fa-seedling text-pink-500', label: 'Primavera', overlay: 'opacity-10 bg-pink-300' },
            'espaco': { icon: 'fa-user-astronaut text-purple-400', label: 'Estrelado', overlay: 'opacity-60 bg-gray-900' },
            'noite_chuvosa': { icon: 'fa-cloud-showers-water text-sky-400', label: 'Chuvoso', overlay: 'opacity-40 bg-blue-900' },
            'biblioteca': { icon: 'fa-book text-amber-500', label: 'Mágico', overlay: 'opacity-10 bg-yellow-600' },
            'cafe': { icon: 'fa-mug-hot text-amber-700', label: 'Cafeteria', overlay: 'opacity-20 bg-amber-900' }
        };

        function changeCenario(envName) {
            activeEnvironment = envName;
            particles = []; 
            const conf = ambienteConfigs[envName];
            document.getElementById('weatherWidget').innerHTML = `<i class="fa-solid ${conf.icon} mr-1"></i> ${conf.label}`;
            document.getElementById('weatherOverlay').className = `fixed inset-0 pointer-events-none z-0 transition-all duration-1000 ${conf.overlay}`;
        }

        function initWeatherEngine() {
            canvas = document.getElementById('weatherCanvas');
            ctx = canvas.getContext('2d');
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            
            function loop() {
                updateWeatherParticles();
                drawWeatherParticles();
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
            document.getElementById('environmentSelect').addEventListener('change', (e) => changeCenario(e.target.value));
            changeCenario('quarto_cozy'); 
        }

        function updateWeatherParticles() {
            const maxParticles = (activeEnvironment === 'noite_chuvosa' || activeEnvironment === 'espaco') ? 80 : 35;

            if (particles.length < maxParticles && Math.random() < 0.3) {
                const autumnColors = ['#e07a5f', '#f2cc8f', '#d08c60', '#f4a261'];
                const leafColor = autumnColors[Math.floor(Math.random() * autumnColors.length)];

                particles.push({ 
                    x: Math.random() * canvas.width, 
                    y: (activeEnvironment === 'cafe' || activeEnvironment === 'biblioteca') ? canvas.height + 20 : -20, 
                    size: Math.random() * 5 + 4, 
                    speedY: Math.random() * 2 + 1, 
                    speedX: Math.random() * 2 - 1, 
                    opacity: Math.random() * 0.5 + 0.3, 
                    angle: Math.random() * Math.PI * 2,
                    spin: (Math.random() - 0.5) * 0.05,
                    color: leafColor
                });
            }

            particles.forEach((p, i) => {
                if (activeEnvironment === 'quarto_cozy') { // Folhas
                    p.speedY = Math.random() * 1.5 + 1; p.x += Math.sin(p.y / 40) * 1;
                } else if (activeEnvironment === 'jardim') { // Sakura
                    p.speedY = Math.random() * 1 + 1; p.x += Math.sin(p.y / 30) * 1.5; p.color = '#ffb3c1';
                } else if (activeEnvironment === 'noite_chuvosa') { // Chuva
                    p.speedY = Math.random() * 5 + 12; p.speedX = 2; p.color = 'rgba(173, 216, 230, 0.8)'; p.angle = -Math.PI / 8;
                } else if (activeEnvironment === 'espaco') { // Estrelas
                    p.speedY = 0.3; p.speedX = 0; p.spin = 0.01;
                    p.color = (Math.random() > 0.8) ? '#ffdf6d' : '#ffffff';
                    p.opacity = Math.abs(Math.sin(Date.now() / 600 + p.x));
                } else if (activeEnvironment === 'cafe' || activeEnvironment === 'biblioteca') {
                    p.speedY = -(Math.random() * 1 + 0.5); p.x += Math.sin(p.y / 30) * 0.5;
                    p.color = activeEnvironment === 'cafe' ? 'rgba(255, 255, 255, 0.2)' : 'rgba(255, 215, 0, 0.7)';
                }

                p.y += p.speedY; p.x += p.speedX; p.angle += p.spin;
                if (p.y > canvas.height + 30 || p.y < -30 || p.x > canvas.width + 30 || p.x < -30) particles.splice(i, 1);
            });
        }

        function drawWeatherParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
                ctx.fillStyle = p.color; ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                
                if (activeEnvironment === 'quarto_cozy') {
                    // Folha de Outono Vetorial
                    ctx.moveTo(0, -p.size); ctx.bezierCurveTo(p.size, -p.size, p.size, p.size, 0, p.size); ctx.bezierCurveTo(-p.size, p.size, -p.size, -p.size, 0, -p.size); ctx.fill();
                } else if (activeEnvironment === 'jardim') {
                    // Pétala Sakura Vetorial
                    ctx.moveTo(0, 0); ctx.bezierCurveTo(p.size, -p.size, p.size*1.5, p.size/2, 0, p.size); ctx.bezierCurveTo(-p.size*1.5, p.size/2, -p.size, -p.size, 0, 0); ctx.fill();
                } else if (activeEnvironment === 'espaco' || activeEnvironment === 'biblioteca') {
                    // Estrela/Poeira
                    ctx.moveTo(0, -p.size); ctx.quadraticCurveTo(0, 0, p.size, 0); ctx.quadraticCurveTo(0, 0, 0, p.size); ctx.quadraticCurveTo(0, 0, -p.size, 0); ctx.quadraticCurveTo(0, 0, 0, -p.size); ctx.fill();
                } else if (activeEnvironment === 'noite_chuvosa') {
                    // Gota
                    ctx.rect(0, 0, 2, p.size * 4); ctx.fill();
                } else if (activeEnvironment === 'cafe') {
                    // Vapor
                    ctx.arc(0, 0, p.size * 3, 0, Math.PI * 2); ctx.shadowBlur = 15; ctx.shadowColor = 'white'; ctx.fill();
                }
                ctx.restore();
            });
        }

        // --- 4. SISTEMA POMODORO E LÓGICA ---
        let state = {
            mode: 'focus', isRunning: false, timeLeft: 1500, duration: 1500, currentSession: 1,
            config: { focus: 25, short_break: 5, long_break: 15 },
            stats: { totalPomodoros: 0, totalMinutes: 0 }, tasks: [], habits: { water: 0 }
        };

        const lottieMascots = {
            focus: "https://assets9.lottiefiles.com/packages/lf20_bhebjzpu.json",         
            short_break: "https://assets5.lottiefiles.com/packages/lf20_tpa51xgw.json",   
            long_break: "https://assets3.lottiefiles.com/packages/lf20_ih2x9v4p.json"     
        };

        let timerInterval = null;

        window.addEventListener('DOMContentLoaded', () => {
            loadFromLocalStorage(); initWeatherEngine(); setupDOMEvents();
            renderTaskList(); renderStatsDashboard(); updateTimerDisplay();
            
            setInterval(() => {
                const now = new Date();
                document.getElementById('liveTime').innerText = now.toLocaleTimeString('pt-BR', { hour12: false });
                document.getElementById('liveDate').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'short' });
            }, 1000);
            
            gsap.from("header, main, footer", { opacity: 0, y: 15, duration: 1, ease: "power2.out", stagger: 0.1 });
        });

        function saveToLocalStorage() { localStorage.setItem('cozy_pomodoro_state', JSON.stringify({ config: state.config, stats: state.stats, tasks: state.tasks, currentSession: state.currentSession })); }

        function loadFromLocalStorage() {
            const data = localStorage.getItem('cozy_pomodoro_state');
            if (data) {
                const parsed = JSON.parse(data);
                if (parsed.config) state.config = parsed.config; if (parsed.stats) state.stats = parsed.stats;
                if (parsed.tasks) state.tasks = parsed.tasks; if (parsed.currentSession) state.currentSession = parsed.currentSession;
            }
            document.getElementById('cfgFocus').value = state.config.focus; document.getElementById('cfgShort').value = state.config.short_break; document.getElementById('cfgLong').value = state.config.long_break;
            state.duration = state.config.focus * 60; state.timeLeft = state.duration;
        }

        function startTimerLoop() {
            if(!state.isRunning) SoundAlerts.playStart();
            state.isRunning = true;
            document.getElementById('toggleTimerIcon').className = "fa-solid fa-pause";
            document.getElementById('toggleTimerText').innerText = state.mode === 'focus' ? "Pausar" : "Pausar Pausa";
            
            timerInterval = setInterval(() => {
                state.timeLeft--;
                if (state.timeLeft <= 0) {
                    clearInterval(timerInterval); state.timeLeft = 0; state.isRunning = false; handleSessionCompletion();
                }
                updateTimerDisplay();
            }, 1000);
        }

        function pauseTimerLoop() {
            clearInterval(timerInterval); state.isRunning = false;
            document.getElementById('toggleTimerIcon').className = "fa-solid fa-play";
            document.getElementById('toggleTimerText').innerText = "Retomar";
        }

        function handleSessionCompletion() {
            SoundAlerts.playEnd();
            confetti({ particleCount: 100, spread: 60, origin: { y: 0.6 }, colors: ['#ffb3c1', '#a2d2ff', '#fbe4ff'] });
            
            if (state.mode === 'focus') {
                state.stats.totalPomodoros++; state.stats.totalMinutes += state.config.focus;
                if (state.currentSession % 4 === 0) switchMode('long_break'); else switchMode('short_break');
            } else {
                state.currentSession++; switchMode('focus');
            }
            renderStatsDashboard(); saveToLocalStorage();
        }

        function switchMode(newMode) {
            if (state.isRunning) pauseTimerLoop();
            state.mode = newMode; state.duration = state.config[newMode] * 60; state.timeLeft = state.duration;
            switchModeVisuals(newMode); updateTimerDisplay();
        }

        function switchModeVisuals(mode) {
            document.body.className = `theme-${mode} min-h-screen p-4 md:p-8 flex flex-col justify-between relative text-gray-700`;
            const lottieEl = document.getElementById('lottieMascot');
            if(lottieEl.load) lottieEl.load(lottieMascots[mode]); else lottieEl.setAttribute('src', lottieMascots[mode]);

            ['focus', 'short_break', 'long_break'].forEach(m => {
                const btn = document.getElementById(`tab-${m}`);
                if (m === mode) btn.className = "text-xs font-bold py-2 px-4 rounded-xl bg-white shadow-xs text-gray-800 transition-all flex-1 text-center";
                else btn.className = "text-xs font-bold py-2 px-4 rounded-xl text-gray-400 hover:text-gray-600 transition-all flex-1 text-center";
            });
            document.getElementById('toggleTimerIcon').className = "fa-solid fa-play";
            document.getElementById('toggleTimerText').innerText = mode === 'focus' ? "Iniciar Foco" : "Iniciar Pausa";
            document.getElementById('currentSessionLabel').innerText = `Sessão #${state.currentSession}`;
        }

        function updateTimerDisplay() {
            const mins = Math.floor(state.timeLeft / 60).toString().padStart(2, '0');
            const secs = (state.timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timerCountdown').innerText = `${mins}:${secs}`;
            const circle = document.getElementById('progressCircle');
            const totalDash = 282.7; const progressFraction = state.timeLeft / state.duration;
            circle.style.strokeDashoffset = totalDash * (1 - progressFraction);
        }

        function renderTaskList() {
            const container = document.getElementById('taskListContainer'); container.innerHTML = '';
            let doneCount = 0;
            state.tasks.forEach((task, index) => {
                if (task.done) doneCount++;
                const card = document.createElement('div');
                card.className = `flex flex-col p-2.5 bg-white/70 rounded-xl border border-white/50 shadow-xs relative group border-l-4 ${task.priority === 3 ? 'border-l-rose-300' : task.priority === 2 ? 'border-l-amber-300' : 'border-l-emerald-300'}`;
                card.innerHTML = `<div class="flex items-center justify-between"><label class="flex items-center gap-2 cursor-pointer w-full"><input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTaskDone(${index})" class="w-4 h-4 rounded text-rose-400 accent-rose-400"><span class="text-xs font-semibold text-gray-700 ${task.done ? 'task-done' : ''}">${task.name}</span></label><button onclick="deleteTask(${index})" class="text-gray-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity text-xs p-1"><i class="fa-solid fa-trash"></i></button></div>`;
                container.appendChild(card);
            });
            document.getElementById('taskCounter').innerText = `${doneCount}/${state.tasks.length}`;
        }

        document.getElementById('addTaskBtn').addEventListener('click', () => {
            const input = document.getElementById('newTaskInput'); if (!input.value.trim()) return;
            state.tasks.push({ name: input.value.trim(), priority: parseInt(document.getElementById('taskPrioritySelect').value), done: false });
            input.value = ''; saveToLocalStorage(); renderTaskList();
        });

        function toggleTaskDone(idx) { state.tasks[idx].done = !state.tasks[idx].done; saveToLocalStorage(); renderTaskList(); }
        function deleteTask(idx) { state.tasks.splice(idx, 1); saveToLocalStorage(); renderTaskList(); }
        function updateHabit(type, value) { if (type === 'water') { state.habits.water = Math.min(state.habits.water + value, 8); document.getElementById('waterCounter').innerText = `${state.habits.water}/8`; } }
        function renderStatsDashboard() { document.getElementById('statTotalPomodoros').innerText = state.stats.totalPomodoros; document.getElementById('statTotalHours').innerText = `${(state.stats.totalMinutes / 60).toFixed(1)}h`; }
        function setupDOMEvents() {
            document.getElementById('toggleTimerBtn').addEventListener('click', () => state.isRunning ? pauseTimerLoop() : startTimerLoop());
            document.getElementById('resetTimerBtn').addEventListener('click', () => { pauseTimerLoop(); state.timeLeft = state.duration; updateTimerDisplay(); });
            document.getElementById('skipTimerBtn').addEventListener('click', () => { pauseTimerLoop(); handleSessionCompletion(); });
        }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); gsap.to(document.getElementById(id), { opacity: 1, duration: 0.2 }); }
        function closeModal(id) { gsap.to(document.getElementById(id), { opacity: 0, duration: 0.2, onComplete: () => document.getElementById(id).classList.add('hidden') }); }
        function saveConfigurations() {
            state.config.focus = Math.max(1, parseInt(document.getElementById('cfgFocus').value)); state.config.short_break = Math.max(1, parseInt(document.getElementById('cfgShort').value)); state.config.long_break = Math.max(1, parseInt(document.getElementById('cfgLong').value));
            saveToLocalStorage(); closeModal('settingsModal'); switchMode(state.mode);
        }
    </script>
</body>
</html>
